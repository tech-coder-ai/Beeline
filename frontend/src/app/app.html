<div class="shell">
  <nav class="side-rail glass">
    <div class="brand" matTooltip="Beeline" matTooltipPosition="right">
      <span class="brand-mark">🐝</span>
    </div>
    @for (item of navItems(); track item.path) {
      <a
        class="rail-item"
        [routerLink]="item.path"
        routerLinkActive="active"
        [matTooltip]="item.label"
        matTooltipPosition="right"
      >
        <mat-icon>{{ item.icon }}</mat-icon>
        <span class="rail-label">{{ item.label }}</span>
      </a>
    }
    <div class="rail-spacer"></div>
    <button
      class="rail-item theme-toggle"
      (click)="theme.toggle()"
      [matTooltip]="theme.dark() ? 'Light mode' : 'Dark mode'"
      matTooltipPosition="right"
    >
      <mat-icon>{{ theme.dark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
  </nav>

  <main class="content">
    <router-outlet />
  </main>
</div>
