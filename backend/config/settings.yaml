# ============================================================
# Beeline Platform Configuration
# Every behavior of the platform is driven from this file.
# Environment variables override via BEELINE__SECTION__KEY.
# ============================================================

app:
  name: Beeline
  environment: development          # development | staging | production
  api_prefix: /api/v1
  cors_origins:
    - http://localhost:4200
    - http://localhost:8080

# ------------------------------------------------------------
# Application metadata repository (NOT the analytics source).
# Switch engines by changing url only: sqlite / postgresql / oracle
# ------------------------------------------------------------
metadata_repository:
  url: sqlite+aiosqlite:///./beeline_meta.db
  # url: postgresql+asyncpg://beeline:beeline@localhost:5432/beeline
  echo: false
  pool_size: 10
  max_overflow: 20

# ------------------------------------------------------------
# Analytics connectors. V1 ships Hive; additional connectors
# plug in via the connector registry without core changes.
# ------------------------------------------------------------
connectors:
  default: hive
  definitions:
    hive:
      type: hive
      display_name: Enterprise Hive
      host: localhost
      port: 10000
      username: hive
      password: ""
      database: default
      auth: NONE                    # NONE | NOSASL | LDAP | KERBEROS
      connect_timeout_seconds: 15
      allowed_schemas: []           # empty = all synchronized schemas
      read_replicas: []             # optional list of {host, port}
      retry:
        attempts: 3
        backoff_seconds: 2

# ------------------------------------------------------------
# LLM providers. `active` selects the provider at runtime.
# stellar: custom local endpoint, POST {systemPrompt, userMessage}
# ------------------------------------------------------------
llm:
  active: openai
  request_timeout_seconds: 60
  providers:
    openai:
      type: openai
      base_url: https://api.openai.com/v1
      api_key: ${OPENAI_API_KEY}
      model: gpt-4o
      temperature: 0.1
      max_tokens: 4096
    stellar:
      type: stellar
      endpoint: http://localhost:9000/generate
      # Request body sent as: {"systemPrompt": "...", "userMessage": "..."}
      response_field: response      # JSON field of the reply containing text; blank = raw body
      headers: {}
      temperature: 0.1

# ------------------------------------------------------------
# NL -> SQL pipeline behavior
# ------------------------------------------------------------
pipeline:
  confidence:
    clarification_threshold: 0.65   # below this the bot asks, never guesses
    autoexecute_threshold: 0.85     # below this show query preview first
  query_preview:
    enabled: true
  query_refinement:
    enabled: true                   # spelling, abbreviations, glossary resolution
  python_fallback:
    enabled: false                  # sandboxed python post-processing (off in v1)
  context:
    max_history_messages: 12
    summarize_after_messages: 30
  query_library:
    enabled: true
    reuse_similarity_threshold: 0.82

# ------------------------------------------------------------
# Guard rails - read-only, always on, not user-disableable
# ------------------------------------------------------------
guardrails:
  read_only: true
  max_result_rows: 10000
  default_limit: 1000               # injected when query has no LIMIT
  query_timeout_seconds: 300
  max_joins: 8
  max_subquery_depth: 3
  forbid_select_star: false         # warn instead of block
  allowed_functions: []             # empty = all non-DDL functions permitted
  blocked_keywords:
    - DROP
    - DELETE
    - UPDATE
    - INSERT
    - MERGE
    - TRUNCATE
    - ALTER
    - CREATE
    - EXEC
    - EXECUTE
    - CALL
    - GRANT
    - REVOKE
    - LOAD
    - MSCK
    - ANALYZE
    - SET
    - RELOAD

# ------------------------------------------------------------
# Cost / safety thresholds - queries exceeding these are not
# executed; the user receives an explanation and suggestions.
# ------------------------------------------------------------
cost:
  max_estimated_rows_scanned: 500000000
  max_estimated_runtime_seconds: 600
  max_estimated_result_rows: 100000
  warn_estimated_rows_scanned: 50000000
  require_partition_filter_tables: []   # table patterns requiring a partition predicate

# ------------------------------------------------------------
# Metadata synchronization from Hive
# ------------------------------------------------------------
metadata_sync:
  enabled: true
  interval_minutes: 720             # scheduled background refresh
  sample_values_per_column: 8
  collect_distinct_counts: true
  collect_null_percentages: true
  max_tables_per_run: 500

# ------------------------------------------------------------
# LLM metadata enrichment
# ------------------------------------------------------------
enrichment:
  enabled: true
  batch_size: 10
  require_approval: true            # AI output always enters approval queue

# ------------------------------------------------------------
# Caching (redis optional - falls back to in-memory)
# ------------------------------------------------------------
cache:
  redis_url: redis://localhost:6379/0
  enabled: true
  result_ttl_seconds: 900
  metadata_ttl_seconds: 3600

# ------------------------------------------------------------
# Visualization planner rules (deterministic, not LLM-chosen)
# ------------------------------------------------------------
visualization:
  max_categories_pie: 8
  max_categories_bar: 30
  max_points_scatter: 5000
  kpi_max_values: 6

# ------------------------------------------------------------
# Configurable grid API actions rendered as buttons on results
# ------------------------------------------------------------
api_actions: []
  # - id: create-ticket
  #   label: Create Ticket
  #   icon: confirmation_number
  #   method: POST
  #   url: https://jira.internal/api/ticket
  #   headers: {}
  #   body_template: '{"summary": "{{summary}}", "rows": {{row_count}}}'
  #   confirm: true

feature_flags:
  dashboards: true
  metadata_manager: true
  saved_queries: true
  approvals: true
  csv_import: true
  explain_sql: true
  feedback: true
