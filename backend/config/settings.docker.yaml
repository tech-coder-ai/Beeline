# Overrides applied inside docker-compose via BEELINE_CONFIG env var.
# Same schema as settings.yaml - only the values that differ from local dev.

app:
  name: Beeline
  environment: development
  api_prefix: /api/v1
  cors_origins:
    - http://localhost:4200
    - http://localhost:8080

metadata_repository:
  url: postgresql+asyncpg://beeline:beeline@postgres:5432/beeline
  echo: false
  pool_size: 10
  max_overflow: 20

connectors:
  default: hive
  definitions:
    hive:
      type: hive
      display_name: Enterprise Hive (docker)
      host: hive-server
      port: 10000
      username: hive
      password: ""
      database: default
      auth: NONE
      connect_timeout_seconds: 20
      allowed_schemas: []
      read_replicas: []
      retry:
        attempts: 3
        backoff_seconds: 2

llm:
  active: openai
  request_timeout_seconds: 60
  providers:
    openai:
      type: openai
      base_url: https://api.openai.com/v1
      api_key: ${OPENAI_API_KEY}
      model: gpt-4o
      temperature: 0.1
      max_tokens: 4096
    stellar:
      type: stellar
      endpoint: ${STELLAR_ENDPOINT}
      response_field: response
      headers: {}
      temperature: 0.1

pipeline:
  confidence:
    clarification_threshold: 0.65
    autoexecute_threshold: 0.85
  query_preview:
    enabled: true
  query_refinement:
    enabled: true
  python_fallback:
    enabled: false
  context:
    max_history_messages: 12
    summarize_after_messages: 30
  query_library:
    enabled: true
    reuse_similarity_threshold: 0.82

guardrails:
  read_only: true
  max_result_rows: 10000
  default_limit: 1000
  query_timeout_seconds: 300
  max_joins: 8
  max_subquery_depth: 3
  forbid_select_star: false
  allowed_functions: []
  blocked_keywords:
    - DROP
    - DELETE
    - UPDATE
    - INSERT
    - MERGE
    - TRUNCATE
    - ALTER
    - CREATE
    - EXEC
    - EXECUTE
    - CALL
    - GRANT
    - REVOKE
    - LOAD
    - MSCK
    - ANALYZE
    - SET
    - RELOAD

cost:
  max_estimated_rows_scanned: 500000000
  max_estimated_runtime_seconds: 600
  max_estimated_result_rows: 100000
  warn_estimated_rows_scanned: 50000000
  require_partition_filter_tables: []

metadata_sync:
  enabled: true
  interval_minutes: 720
  sample_values_per_column: 8
  collect_distinct_counts: true
  collect_null_percentages: true
  max_tables_per_run: 500

enrichment:
  enabled: true
  batch_size: 10
  require_approval: true

cache:
  redis_url: redis://redis:6379/0
  enabled: true
  result_ttl_seconds: 900
  metadata_ttl_seconds: 3600

visualization:
  max_categories_pie: 8
  max_categories_bar: 30
  max_points_scatter: 5000
  kpi_max_values: 6

api_actions: []

feature_flags:
  dashboards: true
  metadata_manager: true
  saved_queries: true
  approvals: true
  csv_import: true
  explain_sql: true
  feedback: true
